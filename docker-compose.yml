services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  # no volumes yet
  minio:
    image: minio/minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password"
    command: server /data --console-address ":9001"

  webserver:
    build: ./webServer
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - PYTHONPATH=/app
    depends_on:
      - redis
      - minio

  worker:
    build: ./worker
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - SANDBOX_RUNTIME_IMAGE=python:3.11-slim
      - SANDBOX_MEMORY_LIMIT=256m
      - SANDBOX_CPU_LIMIT=0.50
      - SANDBOX_TIMEOUT_SECONDS=120
      - PYTHONPATH=/app
    depends_on:
      - redis
      - minio